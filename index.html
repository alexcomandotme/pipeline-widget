<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; }
.pipeline {
  padding: 16px 32px 48px 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  width: 100%;
}
.nodes {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  padding: 0 8px;
}
.connector {
  width: 32px;
  height: 2px;
  background: #444;
  flex-shrink: 0;
  position: relative;
}
.connector::after {
  content: '';
  position: absolute;
  right: -4px;
  top: -3px;
  border-left: 6px solid #444;
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
}
.node-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
}
.node {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  background: rgba(42,42,42,0.9);
  border: 1.5px solid #3a3a3a;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, transform 0.2s;
}
.node:hover {
  border-color: #666;
  transform: translateY(-2px);
}
.node svg { width: 26px; height: 26px; }
.node-label {
  font-size: 11px;
  color: #000;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  white-space: nowrap;
}
.tooltip {
  position: absolute;
  top: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: #000 !important;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 12px 14px;
  width: 200px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
  isolation: isolate;
}
.node-wrap:hover .tooltip { opacity: 1; }
.tooltip::before {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid #333;
}
.tooltip-title {
  font-size: 12px;
  font-weight: 600;
  color: #fff !important;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin-bottom: 4px;
}
.tooltip-body {
  font-size: 11px;
  color: #aaa !important;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.5;
}
</style>
</head>

      </div>
